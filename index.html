<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="健身追踪">
<title>健身追踪</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg: #F5F5F7; --card: #FFFFFF; --border: #E5E5EA;
  --text: #1D1D1F; --sec: #6E6E73; --ter: #AEAEB2;
  --blue: #007AFF; --green: #34C759; --amber: #FF9F0A;
  --red: #FF3B30; --indigo: #5856D6;
  --ta-bg: #E8F0FE; --ta-fg: #1A56C4;
  --tb-bg: #E6F4EA; --tb-fg: #1E7E34;
  --tc-bg: #FFF3E0; --tc-fg: #E65100;
  --r: 12px; --r-sm: 8px; --nav-h: 56px; --safe-b: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: var(--bg); color: var(--text); height: 100%; min-height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased; }
input, textarea, select, button { font-family: inherit; }

/* ── Login ── */
#login-screen { display:flex; align-items:center; justify-content:center;
  min-height: 100vh; padding: 24px; background: var(--bg); }
.login-card { background: var(--card); border-radius: 20px; padding: 40px 32px;
  text-align: center; width: 100%; max-width: 360px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.login-logo { font-size: 52px; margin-bottom: 16px; }
.login-title { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.login-sub { font-size: 15px; color: var(--sec); margin-bottom: 32px; line-height: 1.5; }
.google-btn { display:flex; align-items:center; justify-content:center; gap:10px;
  width: 100%; padding: 14px; border-radius: var(--r); border: 1.5px solid var(--border);
  background: var(--card); font-size: 15px; font-weight: 500; cursor: pointer;
  color: var(--text); transition: background 0.15s; }
.google-btn:active { background: var(--bg); }
.google-btn svg { flex-shrink: 0; }

/* ── App Shell ── */
#app { display:none; flex-direction:column; height: 100vh; height: 100svh;
  overflow:hidden; }
.app-header { background: var(--card); border-bottom: 0.5px solid var(--border);
  padding: 12px 16px 10px; padding-top: calc(12px + env(safe-area-inset-top, 0px));
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-title { font-size: 17px; font-weight: 600; }
.header-user { display:flex; align-items:center; gap:8px; }
.user-avatar { width:30px; height:30px; border-radius:50%; background:var(--blue); object-fit:cover; }
.user-name { font-size: 13px; color: var(--sec); }
.sync-btn { background:none; border:none; cursor:pointer; padding:4px; border-radius:6px; }
.sync-icon { font-size: 18px; color: var(--sec); }
.sync-icon.syncing { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.app-content { flex:1; min-height:0; overflow-y: auto; overscroll-behavior:contain;
  -webkit-overflow-scrolling: touch; }
.tab-panel { display:none; padding: 16px; padding-bottom: calc(var(--nav-h) + var(--safe-b) + 16px); }
.tab-panel.active { display:block; }
#panel-chat.active { height:100%; }

/* ── Bottom Nav ── */
.bottom-nav { display:flex; background:var(--card); border-top:0.5px solid var(--border);
  height:calc(var(--nav-h) + var(--safe-b)); padding-bottom: var(--safe-b);
  flex-shrink: 0; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:var(--nav-h); gap:3px; padding:6px 0;
  background:none; border:none; cursor:pointer;
  color: var(--ter); font-size: 10px; font-weight: 500; transition: color 0.15s; }
.nav-btn.active { color: var(--blue); }
.nav-icon { font-size: 22px; line-height: 1; }

/* ── Cards ── */
.card { background:var(--card); border-radius:var(--r); padding:14px;
  margin-bottom:10px; border: 0.5px solid var(--border); }
.card-title { font-size:15px; font-weight:600; margin-bottom:12px; }
.section-title { font-size:13px; font-weight:600; color:var(--sec);
  text-transform:uppercase; letter-spacing:0.4px; margin:16px 0 8px; }

/* ── Tags ── */
.tag { display:inline-block; font-size:11px; font-weight:500;
  padding:3px 9px; border-radius:20px; flex-shrink:0; }
.tag-a { background:var(--ta-bg); color:var(--ta-fg); }
.tag-b { background:var(--tb-bg); color:var(--tb-fg); }
.tag-c { background:var(--tc-bg); color:var(--tc-fg); }
.tag-rest { background:var(--bg); color:var(--sec); }

/* ── Progress Bar ── */
.prog-wrap { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.prog-bar-bg { flex:1; height:4px; background:var(--bg); border-radius:2px; overflow:hidden; }
.prog-bar-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.4s ease; }
.prog-label { font-size:12px; color:var(--sec); white-space:nowrap; }

/* ── Exercise Rows ── */
.ex-list { }
.ex-row { padding:10px 0; border-bottom:0.5px solid var(--border); }
.ex-row:last-child { border-bottom:none; }
.ex-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:2px; }
.ex-name { font-size:14px; font-weight:500; }
.ex-target { font-size:12px; color:var(--sec); }
.ex-done-badge { font-size:11px; color:var(--green); font-weight:500; }
.set-row { display:flex; align-items:center; gap:6px; margin-top:7px; }
.set-label { font-size:11px; color:var(--ter); width:26px; flex-shrink:0; }
.set-input { width:46px; text-align:center; font-size:14px; border:1px solid var(--border);
  border-radius:7px; padding:5px 4px; background:var(--bg); color:var(--text);
  outline:none; -webkit-appearance:none; }
.set-input:focus { border-color:var(--blue); }
.set-unit { font-size:11px; color:var(--ter); white-space:nowrap; }
.set-band { font-size:12px; border:1px solid var(--border); border-radius:7px;
  padding:5px 6px; background:var(--bg); color:var(--text); outline:none; }
.done-btn { background:none; border:1px solid var(--border); border-radius:7px;
  padding:5px 10px; font-size:12px; cursor:pointer; color:var(--sec); white-space:nowrap;
  flex-shrink:0; transition:all 0.15s; }
.done-btn.done { background:var(--tb-bg); border-color:#97C459; color:var(--tb-fg); }

/* ── Edit Exercises Button ── */
.edit-plan-btn { display:flex; align-items:center; gap:6px; background:none;
  border:1px solid var(--border); border-radius:20px; padding:5px 12px;
  font-size:12px; color:var(--sec); cursor:pointer; margin-top:10px; }

/* ── Meals ── */
.meal-item { display:flex; align-items:flex-start; gap:8px; padding:7px 0;
  border-bottom:0.5px solid var(--border); }
.meal-item:last-child { border-bottom:none; }
.meal-time { font-size:11px; color:var(--sec); white-space:nowrap; min-width:40px; margin-top:2px; }
.meal-body { flex:1; min-width:0; }
.meal-text { font-size:14px; color:var(--text); line-height:1.4; }
.del-btn { background:none; border:none; cursor:pointer; font-size:18px;
  color:var(--ter); padding:0; flex-shrink:0; line-height:1; }
.meal-add-row { display:flex; gap:6px; align-items:center; margin-top:10px; flex-wrap:wrap; }
.meal-add-row input { font-size:13px; border:1px solid var(--border); border-radius:7px;
  padding:7px 10px; background:var(--bg); color:var(--text); outline:none; }
.meal-add-row input:focus { border-color:var(--blue); }
.meal-time-inp { width:70px; }
.meal-text-inp { flex:1; min-width:120px; }
.add-meal-btn { padding:7px 14px; font-size:13px; font-weight:500; border-radius:7px;
  border:none; background:var(--blue); color:white; cursor:pointer; white-space:nowrap; }
.photo-btn { padding:7px 10px; border-radius:7px; border:1px solid var(--border);
  background:var(--bg); cursor:pointer; font-size:16px; }
.record-photo-wrap { position:relative; flex-shrink:0; }
.record-photo-btn { width:34px; height:34px; border-radius:8px; border:1px solid var(--border);
  background:var(--bg); cursor:pointer; font-size:16px; display:flex;
  align-items:center; justify-content:center; }
.record-photo-menu { left:auto; right:0; bottom:40px; }
.record-photo-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.record-photo-thumb { width:72px; height:72px; border-radius:10px; overflow:hidden;
  border:1px solid var(--border); background:var(--bg); position:relative; flex-shrink:0; }
.record-photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.record-photo-remove { position:absolute; top:4px; right:4px; width:22px; height:22px;
  border:none; border-radius:50%; background:rgba(0,0,0,0.55); color:white;
  cursor:pointer; font-size:15px; line-height:22px; padding:0; }
.record-photo-hint { font-size:11px; color:var(--ter); margin-top:8px; }

/* ── Notes ── */
.note-area { width:100%; border:1px solid var(--border); border-radius:var(--r-sm);
  padding:10px; font-size:14px; color:var(--text); background:var(--bg);
  resize:none; min-height:72px; outline:none; font-family:inherit; line-height:1.5; }
.note-area:focus { border-color:var(--blue); }
.note-toolbar { display:flex; align-items:center; justify-content:flex-end; margin-top:8px; }

/* ── Buttons ── */
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:4px; }
.btn { padding:11px; font-size:14px; font-weight:500; border-radius:var(--r-sm);
  border:1px solid var(--border); background:var(--bg); cursor:pointer;
  color:var(--text); transition:all 0.15s; display:flex; align-items:center;
  justify-content:center; gap:6px; }
.btn:active { opacity:0.7; }
.btn-primary { background:var(--blue); border-color:var(--blue); color:white; }
.btn-saved { background:var(--tb-bg); border-color:var(--green); color:var(--tb-fg); }
.save-note { font-size:11px; color:var(--ter); text-align:center; margin-top:8px; }

/* ── History ── */
.hist-item { border-bottom:0.5px solid var(--border); }
.hist-item:last-child { border-bottom:none; }
.hist-hd { display:flex; align-items:center; justify-content:space-between;
  padding:11px 0; cursor:pointer; gap:8px; }
.hist-hd-left { flex:1; min-width:0; }
.hist-date-row { display:flex; align-items:center; gap:8px; margin-bottom:3px; }
.hist-date { font-size:14px; font-weight:500; }
.hist-summary { font-size:12px; color:var(--sec); }
.hist-chevron { font-size:16px; color:var(--ter); flex-shrink:0; transition:transform 0.2s; }
.hist-chevron.open { transform:rotate(180deg); }
.hist-detail { display:none; padding:0 0 12px; }
.hist-detail.open { display:block; }
.hist-detail-section { margin-bottom:8px; }
.hist-detail-label { font-size:11px; font-weight:600; color:var(--sec);
  text-transform:uppercase; letter-spacing:0.3px; margin-bottom:4px; }
.hist-ex-row { display:flex; gap:8px; padding:2px 0; font-size:13px; }
.hist-ex-icon { color:var(--green); flex-shrink:0; }
.hist-ex-icon.partial { color:var(--amber); }
.hist-ex-icon.none { color:var(--ter); }
.hist-meal-entry { padding:2px 0 6px; }
.hist-meal-row { display:flex; gap:8px; font-size:13px; }
.hist-meal-time { color:var(--sec); white-space:nowrap; min-width:40px; }
.hist-note-box { font-size:13px; color:var(--sec); background:var(--bg);
  padding:8px; border-radius:var(--r-sm); margin-top:4px; }
.hist-note-text { white-space:pre-wrap; }

/* ── Chat ── */
.chat-container { display:flex; flex-direction:column;
  height:100%; min-height:0; overflow:hidden; }
.chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex;
  flex-direction:column; gap:10px; min-height:0; overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch; }
.msg { max-width:82%; display:flex; flex-direction:column; gap:4px; }
.msg.user { align-self:flex-end; align-items:flex-end; }
.msg.ai { align-self:flex-start; align-items:flex-start; }
.msg-bubble { padding:10px 13px; border-radius:18px; font-size:14px;
  line-height:1.5; word-break:break-word; }
.msg.user .msg-bubble { background:var(--blue); color:white; border-bottom-right-radius:4px; }
.msg.ai .msg-bubble { background:var(--card); border:0.5px solid var(--border);
  color:var(--text); border-bottom-left-radius:4px; }
.msg-bubble img { max-width:200px; border-radius:10px; display:block; margin-top:6px; }
.msg-time { font-size:10px; color:var(--ter); padding:0 4px; }
.chat-input-wrap { padding:10px 16px; padding-bottom:calc(10px + var(--safe-b));
  background:var(--card); border-top:0.5px solid var(--border);
  display:flex; align-items:flex-end; gap:8px; flex-shrink:0; }
.chat-input { flex:1; border:1px solid var(--border); border-radius:20px;
  padding:9px 14px; font-size:16px; background:var(--bg); color:var(--text);
  outline:none; resize:none; max-height:100px; font-family:inherit;
  line-height:1.4; overflow-y:auto; }
.chat-input:focus { border-color:var(--blue); }
.chat-photo-wrap { position:relative; flex-shrink:0; }
.chat-cam-btn { width:36px; height:36px; border-radius:50%; border:1px solid var(--border);
  background:var(--bg); cursor:pointer; font-size:18px; display:flex;
  align-items:center; justify-content:center; flex-shrink:0; }
.photo-menu { display:none; position:absolute; left:0; bottom:44px; min-width:154px;
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  box-shadow:0 8px 28px rgba(0,0,0,0.14); padding:6px; z-index:20; }
.photo-menu.open { display:block; }
.photo-option { width:100%; border:none; background:transparent; border-radius:8px;
  padding:10px 12px; font-size:14px; color:var(--text); text-align:left;
  cursor:pointer; white-space:nowrap; }
.photo-option:active { background:var(--bg); }
.chat-send-btn { width:36px; height:36px; border-radius:50%; border:none;
  background:var(--blue); cursor:pointer; color:white; font-size:18px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.chat-send-btn:disabled { background:var(--ter); }
.chat-preview { display:none; align-items:center; gap:10px; padding:8px 16px;
  background:var(--card); border-top:0.5px solid var(--border); }
.chat-preview.open { display:flex; }
.chat-preview img { width:54px; height:54px; border-radius:10px; object-fit:cover;
  border:1px solid var(--border); }
.chat-preview-text { flex:1; font-size:12px; color:var(--sec); }
.chat-preview-remove { border:none; background:var(--bg); color:var(--sec);
  width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:18px; }
.typing-indicator .msg-bubble { padding:12px 16px; }
.dot { display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--ter); animation:bounce 1.2s infinite; margin:0 2px; }
.dot:nth-child(2) { animation-delay:0.2s; }
.dot:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ── Modal ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4);
  z-index:100; align-items:flex-end; }
.modal-overlay.open { display:flex; }
.modal { background:var(--card); border-radius:20px 20px 0 0; width:100%;
  max-height:85vh; display:flex; flex-direction:column;
  padding-bottom:var(--safe-b); }
.modal-header { display:flex; align-items:center; justify-content:space-between;
  padding:16px 16px 12px; border-bottom:0.5px solid var(--border); }
.modal-title { font-size:17px; font-weight:600; }
.modal-close { background:none; border:none; font-size:24px; cursor:pointer;
  color:var(--sec); line-height:1; }
.modal-body { flex:1; overflow-y:auto; padding:12px 16px; }
.modal-footer { padding:12px 16px; border-top:0.5px solid var(--border); }

.edit-ex-item { display:flex; align-items:center; gap:10px; padding:10px 0;
  border-bottom:0.5px solid var(--border); }
.edit-ex-item:last-child { border-bottom:none; }
.edit-ex-toggle { width:20px; height:20px; border-radius:50%; border:1.5px solid var(--border);
  cursor:pointer; background:var(--bg); flex-shrink:0; display:flex;
  align-items:center; justify-content:center; font-size:11px; }
.edit-ex-toggle.on { background:var(--blue); border-color:var(--blue); color:white; }
.edit-ex-name { flex:1; font-size:14px; }
.edit-ex-sets { width:36px; text-align:center; font-size:13px; border:1px solid var(--border);
  border-radius:6px; padding:4px; background:var(--bg); }
.edit-section-label { font-size:12px; font-weight:600; color:var(--sec);
  text-transform:uppercase; letter-spacing:0.3px; margin:12px 0 6px; }

/* ── Misc ── */
.rest-card-body { font-size:14px; color:var(--sec); line-height:1.6; }
.next-training { margin-top:8px; font-size:13px; color:var(--ter); }
.first-badge { font-size:11px; color:var(--amber); background:#FFF3E0;
  padding:2px 8px; border-radius:20px; font-weight:500; }
.empty-state { text-align:center; padding:48px 24px; color:var(--sec); font-size:14px; }
.empty-icon { font-size:40px; margin-bottom:12px; }
.tip-box { background:var(--ta-bg); border-radius:var(--r-sm); padding:10px 12px;
  font-size:12px; color:var(--ta-fg); margin-bottom:12px; }
#hidden-camera, #hidden-gallery, #meal-camera, #meal-gallery, #note-camera, #note-gallery { display:none; }

@media (max-width: 700px) {
  input, textarea, select { font-size:16px !important; }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">💪</div>
    <h1 class="login-title">健身追踪</h1>
    <p class="login-sub">你的12周健身计划助手<br>数据同步到 Google Drive</p>
    <button class="google-btn" onclick="Auth.signIn()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      使用 Google 账号登录
    </button>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <header class="app-header">
    <div class="header-user" id="header-user"></div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="sync-btn" onclick="Drive.sync()" title="同步数据">
        <span class="sync-icon" id="sync-icon">⟳</span>
      </button>
    </div>
  </header>

  <main class="app-content">
    <div id="panel-today" class="tab-panel active"></div>
    <div id="panel-history" class="tab-panel"></div>
    <div id="panel-chat" class="tab-panel" style="padding:0">
      <div class="chat-container" id="chat-container"
        onpaste="Chat.handlePaste(event)" ondragover="Chat.handleDragOver(event)" ondrop="Chat.handleDrop(event)">
        <div class="chat-messages" id="chat-messages">
          <div class="msg ai">
            <div class="msg-bubble">你好！我是你的健身助手 👋<br>可以告诉我你今天吃了什么、做了什么运动，或者直接拍照给我看！</div>
          </div>
        </div>
        <div class="chat-preview" id="chat-preview"></div>
        <div class="chat-input-wrap">
          <div class="chat-photo-wrap">
            <button class="chat-cam-btn" onclick="Chat.togglePhotoMenu(event)" title="添加图片">📷</button>
            <div class="photo-menu" id="chat-photo-menu">
              <button class="photo-option" onclick="Chat.pickPhoto('camera')">📷 拍照</button>
              <button class="photo-option" onclick="Chat.pickPhoto('gallery')">🖼️ 从相册选择</button>
            </div>
          </div>
          <textarea class="chat-input" id="chat-input" placeholder="发消息给 AI 助手…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();Chat.send()}"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
          <button class="chat-send-btn" id="chat-send-btn" onclick="Chat.send()">↑</button>
        </div>
        <input type="file" id="hidden-camera" accept="image/*" capture="environment" onchange="Chat.handlePhoto(this, '📷 已拍摄图片')">
        <input type="file" id="hidden-gallery" accept="image/*" onchange="Chat.handlePhoto(this, '🖼️ 已选择图片')">

// ─────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────
const Auth = {
  token: null,
  profile: null,
  tokenClient: null,
  silentTried: false,
  storageKey: 'ft_auth',

  init() {
    window.addEventListener('load', () => this.setupTokenClient());
  },

  setupTokenClient() {
    if (typeof google === 'undefined' || !google.accounts?.oauth2) {
      setTimeout(() => this.setupTokenClient(), 500);
      return;
    }
    this.tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CONFIG.CLIENT_ID,
      scope: CONFIG.SCOPES,
      callback: (resp) => {
        if (resp.error) { console.error(resp); return; }
        this.saveToken(resp);
        this.loadProfile({ interactive: true });
      }
    });
    if (this.restoreToken()) {
      this.loadProfile({ interactive: false });
    } else {
      this.trySilentSignIn();
    }
  },

  signIn() {
    if (!this.tokenClient) { alert('Google SDK 加载中，请稍后再试'); return; }
    this.tokenClient.requestAccessToken();
  },

  trySilentSignIn() {
    if (!this.tokenClient || this.silentTried) return;
    this.silentTried = true;
    try {
      this.tokenClient.requestAccessToken({ prompt: '' });
    } catch(e) {}
  },

  saveToken(resp) {
    this.token = resp.access_token;
    const expiresIn = Number(resp.expires_in || 3600);
    const expiresAt = Date.now() + Math.max(expiresIn - 60, 60) * 1000;
    localStorage.setItem(this.storageKey, JSON.stringify({ token: this.token, expiresAt }));
  },

  restoreToken() {
    try {
      const saved = JSON.parse(localStorage.getItem(this.storageKey) || 'null');
      if (!saved?.token || !saved.expiresAt || saved.expiresAt <= Date.now()) {
        this.clearSavedToken();
        return false;
      }
      this.token = saved.token;
      return true;
    } catch(e) {
      this.clearSavedToken();
      return false;
    }
  },

  clearSavedToken() {
    localStorage.removeItem(this.storageKey);
    this.token = null;
  },

  async loadProfile({ interactive = false } = {}) {
    try {
      const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
        { headers: { Authorization: `Bearer ${this.token}` } });
      if (!r.ok) {
        this.clearSavedToken();
        if (interactive) this.signIn();
        else this.trySilentSignIn();
        return;
      }
      this.profile = await r.json();
      this.onSignedIn();
    } catch(e) {
      this.clearSavedToken();
      if (interactive) this.signIn();
      else this.trySilentSignIn();
    }
  },

  onSignedIn() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    const u = document.getElementById('header-user');
    u.innerHTML = `
      <img class="user-avatar" src="${this.profile.picture}" alt="">
      <span class="user-name">${this.profile.given_name}</span>`;
    App.start();
  },

  signOut() {
    this.clearSavedToken();
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }
};

// ─────────────────────────────────────────
// GOOGLE DRIVE
// ─────────────────────────────────────────
const Drive = {
  fileId: null,
  dirty: false,
  timer: null,

  async findFile() {
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${CONFIG.DRIVE_FILE}'+and+trashed=false&fields=files(id,name)`,
      { headers: { Authorization: `Bearer ${Auth.token}` } });
    const d = await r.json();
    return d.files && d.files.length > 0 ? d.files[0].id : null;
  },

  async load() {
    this.setSyncStatus('syncing');
    try {
      this.fileId = await this.findFile();
      if (!this.fileId) {
        DataStore.data = DataStore.defaultData();
        await this.save(true);
      } else {
        const r = await fetch(
          `https://www.googleapis.com/drive/v3/files/${this.fileId}?alt=media`,
          { headers: { Authorization: `Bearer ${Auth.token}` } });
        DataStore.data = await r.json();
      }
      DataStore.normalize();
      this.setSyncStatus('synced');
    } catch(e) {
      console.error('Drive load error:', e);
      DataStore.data = DataStore.defaultData();
      DataStore.normalize();
      this.setSyncStatus('offline');
    }
    UI.renderToday();
  },

  async save(force = false) {
    if (!force && !this.dirty) return;
    this.setSyncStatus('syncing');
    const body = JSON.stringify(DataStore.data);
    try {
      if (!this.fileId) {
        const meta = { name: CONFIG.DRIVE_FILE, mimeType: 'application/json' };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(meta)], { type:'application/json' }));
        form.append('media', new Blob([body], { type:'application/json' }));
        const r = await fetch(
          'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
          { method:'POST', headers:{ Authorization:`Bearer ${Auth.token}` }, body:form });
        const d = await r.json();
        this.fileId = d.id;
      } else {
        await fetch(
          `https://www.googleapis.com/upload/drive/v3/files/${this.fileId}?uploadType=media`,
          { method:'PATCH', headers:{ Authorization:`Bearer ${Auth.token}`, 'Content-Type':'application/json' }, body });
      }
      this.dirty = false;
      this.setSyncStatus('synced');
    } catch(e) {
      this.setSyncStatus('offline');
    }
  },

  async sync() { await this.save(true); },

  scheduleSave() {
    this.dirty = true;
    clearTimeout(this.timer);
    this.timer = setTimeout(() => this.save(), 2000);
  },

  setSyncStatus(s) {
    const el = document.getElementById('sync-icon');
    if (!el) return;
    el.className = 'sync-icon' + (s === 'syncing' ? ' syncing' : '');
    el.textContent = s === 'synced' ? '✓' : s === 'offline' ? '⚠' : '⟳';
    el.title = s === 'synced' ? '已同步' : s === 'offline' ? '离线' : '同步中…';
  }
};

// ─────────────────────────────────────────
// DATA STORE
// ─────────────────────────────────────────
const DataStore = {
  data: null,

  defaultData() {
    return { version: 1, days: {}, aiMemory: '', memoryUpdatedAt: null };
  },

  normalize() {
    if (!this.data || typeof this.data !== 'object') this.data = this.defaultData();
    if (!this.data.days) this.data.days = {};
    if (typeof this.data.aiMemory !== 'string') this.data.aiMemory = '';
    if (!('memoryUpdatedAt' in this.data)) this.data.memoryUpdatedAt = null;
    Object.values(this.data.days).forEach(day => {
      if (!Array.isArray(day.meals)) day.meals = [];
      if (typeof day.note !== 'string') day.note = '';
      if (!Array.isArray(day.notePhotos)) day.notePhotos = [];
      day.meals.forEach(meal => {
        if (!Array.isArray(meal.photos)) meal.photos = [];
      });
    });
  },

  today() { return this.dateStr(new Date()); },

  dateStr(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  },

  getDay(dt) {
    if (!this.data.days[dt]) {
      const dow = new Date(dt + 'T12:00:00').getDay();
      const st = DAY_MAP[dow] || 'rest';
      const day = { date: dt, st, customExercises: null, exercises: {}, meals: [], note: '', notePhotos: [] };
      if (st !== 'rest') {
        const exList = this.getExerciseList(dt);
        exList.forEach(e => {
          day.exercises[e.id] = Array.from({length: e.sets}, () =>
            e.type === 'band' ? {v:'',b:'轻',d:false} : {v:'',d:false}
          );
        });
      }
      this.data.days[dt] = day;
    }
    return this.data.days[dt];
  },

  getExerciseList(dt) {
    const day = this.data.days[dt];
    if (day && day.customExercises) return day.customExercises;
    const st = DAY_MAP[new Date(dt + 'T12:00:00').getDay()];
    return st ? PLAN[st].exercises : [];
  },

  saveDay(dt, updates) {
    Object.assign(this.data.days[dt], updates);
    Drive.scheduleSave();
  }
};

// ─────────────────────────────────────────
// LOCAL IMAGE THUMBNAILS
// ─────────────────────────────────────────
const ImageStore = {
  maxEdge: 900,
  quality: 0.72,

  async compressFiles(files) {
    const picked = Array.from(files || []).filter(f => (f.type || '').startsWith('image/'));
    const photos = [];
    for (const file of picked) {
      const photo = await this.compressFile(file);
      if (photo) photos.push(photo);
    }
    return photos;
  },

  compressFile(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onerror = () => resolve(null);
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => resolve(null);
        img.onload = () => {
          const sourceW = img.naturalWidth || img.width;
          const sourceH = img.naturalHeight || img.height;
          const scale = Math.min(1, this.maxEdge / Math.max(sourceW, sourceH));
          const width = Math.max(1, Math.round(sourceW * scale));
          const height = Math.max(1, Math.round(sourceH * scale));
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve({
            dataUrl: canvas.toDataURL('image/jpeg', this.quality),
            width,
            height,
            createdAt: new Date().toISOString()
          });
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }
};

  toggleSet(eid, si) {
    this.syncInputs();
    const dt = DataStore.today();
    const day = DataStore.getDay(dt);
    if (!day.exercises[eid] || !day.exercises[eid][si]) return;
    day.exercises[eid][si].d = !day.exercises[eid][si].d;
    const done = day.exercises[eid][si].d;
    const btn = document.getElementById(`sb-${eid}-${si}`);
    if (btn) { btn.className = done ? 'done-btn done' : 'done-btn'; btn.textContent = done ? '✓' : '完成'; }
    const allDone = day.exercises[eid].every(s => s.d);
    const badge = document.getElementById(`done-${eid}`);
    if (badge) badge.style.display = allDone ? 'inline' : 'none';
    // Update progress
    const exList = DataStore.getExerciseList(dt);
    let tot = 0, dn = 0;
    exList.forEach(e => { (day.exercises[e.id]||[]).forEach(s => { tot++; if(s.d) dn++; }); });
    const bar = document.getElementById('prog-fill');
    const lbl = document.getElementById('prog-label');
    if (bar) bar.style.width = (tot > 0 ? Math.round(dn/tot*100) : 0) + '%';
    if (lbl) lbl.textContent = `${dn}/${tot} 组`;
    Drive.scheduleSave();
  },

  addMeal() {
    this.syncInputs();
    const dt = DataStore.today();
    const day = DataStore.getDay(dt);
    const te = document.getElementById('m-time');
    const xe = document.getElementById('m-text');
    const time = (te && te.value.trim()) || new Date().toTimeString().slice(0,5);
    const text = xe && xe.value.trim();
    if (!text && !this.mealDraftPhotos.length) return;
    day.meals.push({ time, text: text || '图片记录', photos: this.mealDraftPhotos });
    this.mealDraftPhotos = [];
    Drive.scheduleSave();
    const ml = document.getElementById('meal-list');
    if (ml) ml.innerHTML = this.mealListHTML(day.meals);
  },

  deleteMeal(i) {
    this.syncInputs();
    const day = DataStore.getDay(DataStore.today());
    day.meals.splice(i, 1);
    Drive.scheduleSave();
    const ml = document.getElementById('meal-list');
    if (ml) ml.innerHTML = this.mealListHTML(day.meals);
  },

  saveNote(val) {
    const day = DataStore.getDay(DataStore.today());
    day.note = val;
    Drive.scheduleSave();
  },

  toggleRecordPhotoMenu(target, event) {
    event?.stopPropagation();
    document.querySelectorAll('.record-photo-menu').forEach(menu => {
      if (menu.id !== `${target}-photo-menu`) menu.classList.remove('open');
    });
    document.getElementById(`${target}-photo-menu`)?.classList.toggle('open');
  },

  closeRecordPhotoMenus() {
    document.querySelectorAll('.record-photo-menu').forEach(menu => menu.classList.remove('open'));
  },

  pickRecordPhoto(target, source) {
    this.closeRecordPhotoMenus();
    const id = `${target}-${source === 'camera' ? 'camera' : 'gallery'}`;
    document.getElementById(id)?.click();
  },

  async handleRecordPhoto(input, target) {
    const photos = await ImageStore.compressFiles(input.files);
    input.value = '';
    if (!photos.length) return;

    if (target === 'meal') {
      this.mealDraftPhotos.push(...photos);
      const day = DataStore.getDay(DataStore.today());
      const ml = document.getElementById('meal-list');
      if (ml) ml.innerHTML = this.mealListHTML(day.meals);
      return;
    }

    if (target === 'note') {
      const day = DataStore.getDay(DataStore.today());
      const noteEl = document.getElementById('note-area');
      if (noteEl) day.note = noteEl.value;
      day.notePhotos = day.notePhotos || [];
      day.notePhotos.push(...photos);
      Drive.scheduleSave();
      this.renderToday();
    }
  },

  removeMealDraftPhoto(i) {
    this.mealDraftPhotos.splice(i, 1);
    const day = DataStore.getDay(DataStore.today());
    const ml = document.getElementById('meal-list');
    if (ml) ml.innerHTML = this.mealListHTML(day.meals);
  },

  deleteNotePhoto(i) {
    const day = DataStore.getDay(DataStore.today());
    day.notePhotos = day.notePhotos || [];
    day.notePhotos.splice(i, 1);
    Drive.scheduleSave();
    this.renderToday();
  },

  async saveToday() {
    this.syncInputs();
    const noteEl = document.getElementById('note-area');
    if (noteEl) this.saveNote(noteEl.value);
    const btn = document.getElementById('save-btn');
    if (btn) { btn.className = 'btn btn-saved'; btn.textContent = '✓ 已保存'; }
    await Drive.save(true);
    setTimeout(() => { if (btn) { btn.className = 'btn btn-primary'; btn.textContent = '💾 保存记录'; } }, 2000);
  },

  nextSession(dow) {
    const order = [1, 3, 5];
    for (const d of order) if (d > dow) return `${DC[d]}（训练 ${DAY_MAP[d]}）`;
    return `下周${DC[order[0]]}（训练 ${DAY_MAP[order[0]]}）`;
  }
};

const History = {
  openDay: null,

  render() {
    const days = Object.keys(DataStore.data.days).sort().reverse();
    if (!days.length) {
      document.getElementById('panel-history').innerHTML = `
        <div class="empty-state"><div class="empty-icon">📋</div>还没有记录<br>完成今天的训练后保存即可出现</div>`;
      return;
    }
    let html = '';
    days.forEach(dt => {
      const day = DataStore.data.days[dt];
      if (!day) return;
      const dow = new Date(dt + 'T12:00:00').getDay();
      const st = day.st;
      const cls = st==='A'?'tag-a':st==='B'?'tag-b':st==='C'?'tag-c':'tag-rest';
      const lbl = st==='rest'?'休息':'训练 '+st;
      let tot=0, dn=0;
      if (st !== 'rest') Object.values(day.exercises||{}).forEach(sets => sets.forEach(s => { tot++; if(s.d) dn++; }));
      const mc = (day.meals||[]).length;
      const photoCount = (day.notePhotos || []).length + (day.meals || []).reduce((sum, m) => sum + (m.photos || []).length, 0);
      const [y,m,d] = dt.split('-');
      const isOpen = this.openDay === dt;
      html += `<div class="hist-item">
        <div class="hist-hd" onclick="History.toggle('${dt}')">
          <div class="hist-hd-left">
            <div class="hist-date-row">
              <span class="hist-date">${y}/${m}/${d} ${DC[dow]}</span>
              <span class="tag ${cls}">${lbl}</span>
            </div>
            <span class="hist-summary">${st!=='rest'?`训练 ${dn}/${tot} 组 · `:''}饮食 ${mc} 条${day.note?' · 有备注':''}${photoCount ? ` · 图片 ${photoCount} 张` : ''}</span>
          </div>
          <span class="hist-chevron ${isOpen?'open':''}">⌄</span>
        </div>
        <div class="hist-detail ${isOpen?'open':''}">${isOpen?this.detailHTML(day):''}</div>
      </div>`;
    });
    document.getElementById('panel-history').innerHTML = `<div class="card" style="padding:4px 14px">${html}</div>`;
  },

  toggle(dt) {
    this.openDay = this.openDay === dt ? null : dt;
    this.render();
  },

  detailHTML(day) {
    const st = day.st;
    let h = '<div style="padding-top:10px">';
    if (st !== 'rest' && PLAN[st]) {
      h += `<div class="hist-detail-section"><div class="hist-detail-label">训练 ${st} — ${PLAN[st].name}</div>`;
      const exList = day.customExercises || PLAN[st].exercises;
      exList.forEach(e => {
        const sets = day.exercises?.[e.id] || [];
        const done = sets.filter(s => s.d);
        const iconCls = done.length === sets.length && sets.length > 0 ? '' : done.length > 0 ? 'partial' : 'none';
        const icon = done.length === sets.length && sets.length > 0 ? '✓' : done.length > 0 ? '◑' : '○';
        let detail = `${done.length}/${sets.length} 组`;
        const vals = done.filter(s => s.v && s.v !== '');
        if (vals.length) {
          const unit = e.type==='time'?'秒':e.type==='side'?'/侧':'次';
          if (e.type === 'band') {
            const bs = [...new Set(done.filter(s=>s.b).map(s=>s.b))];
            detail += ` · ${vals[0].v}次${bs.length?' '+bs[0]+'阻力':''}`;
          } else detail += ` · ${vals.map(s=>s.v+unit).join('/')}`;
        }
        h += `<div class="hist-ex-row"><span class="hist-ex-icon ${iconCls}">${icon}</span>
          <span style="flex:1">${e.name}</span><span style="color:var(--sec)">${detail}</span></div>`;
      });
      h += '</div>';
    }
    if ((day.meals||[]).length) {
      h += `<div class="hist-detail-section"><div class="hist-detail-label">饮食</div>`;
      day.meals.forEach((m, i) => {
        h += `<div class="hist-meal-entry">
          <div class="hist-meal-row"><span class="hist-meal-time">${m.time}</span><span>${m.text || '图片记录'}</span></div>
          ${UI.photoGridHTML(m.photos || [], `hist-meal-${i}`, false)}
        </div>`;
      });
      h += '</div>';
    }
    if (day.note || (day.notePhotos || []).length) {
      h += `<div class="hist-note-box">
        ${day.note ? `<div class="hist-note-text">📝 ${day.note}</div>` : ''}
        ${UI.photoGridHTML(day.notePhotos || [], 'hist-note', false)}
      </div>`;
    }
    h += '</div>';
    return h;
  }
};

const EditModal = {
  tempList: null,

  open() {
    const dt = DataStore.today();
    const day = DataStore.getDay(dt);
    const st = day.st;
    if (st === 'rest') return;
    const currentList = DataStore.getExerciseList(dt);
    this.tempList = JSON.parse(JSON.stringify(currentList));

    let html = '<div class="edit-section-label">当前训练动作</div>';
    this.tempList.forEach((e, idx) => {
      html += `<div class="edit-ex-item">
        <button class="edit-ex-toggle on" id="etog-${idx}" onclick="EditModal.removeEx(${idx})">✓</button>
        <span class="edit-ex-name">${e.name}</span>
        <span style="font-size:12px;color:var(--sec)">
          <input class="edit-ex-sets" type="text" inputmode="numeric" value="${e.sets}" id="esets-${idx}">组
        </span>
      </div>`;
    });

    html += '<div class="edit-section-label" style="margin-top:16px">添加动作</div>';
    // All available exercises not already in list
    const allEx = [...PLAN.A.exercises, ...PLAN.B.exercises, ...PLAN.C.exercises];
    const currentIds = new Set(this.tempList.map(e => e.id));
    allEx.filter(e => !currentIds.has(e.id)).forEach(e => {
      html += `<div class="edit-ex-item">
        <button class="edit-ex-toggle" onclick="EditModal.addEx('${e.id}')">+</button>
        <span class="edit-ex-name">${e.name}</span>
        <span style="font-size:12px;color:var(--sec)">${e.target}</span>
      </div>`;
    });

    document.getElementById('edit-modal-body').innerHTML = html;
    document.getElementById('edit-modal').classList.add('open');
  },

  removeEx(idx) {
    this.tempList.splice(idx, 1);
    this.open();
  },

  addEx(id) {
    const e = [...PLAN.A.exercises, ...PLAN.B.exercises, ...PLAN.C.exercises].find(x => x.id === id);
    if (e) { this.tempList.push({...e}); this.open(); }
  },

  save() {
    // Sync set counts from inputs
    this.tempList.forEach((e, idx) => {
      const inp = document.getElementById(`esets-${idx}`);
      if (inp) e.sets = Math.max(1, parseInt(inp.value) || e.sets);
    });
    const dt = DataStore.today();
    const day = DataStore.getDay(dt);
    day.customExercises = this.tempList.length > 0 ? this.tempList : null;
    // Re-initialize exercises for new list
    this.tempList.forEach(e => {
      if (!day.exercises[e.id]) {
        day.exercises[e.id] = Array.from({length: e.sets}, () =>
          e.type === 'band' ? {v:'',b:'轻',d:false} : {v:'',d:false}
        );
      }
    });
    Drive.scheduleSave();
    this.close();
    UI.renderToday();
  },

  close() { document.getElementById('edit-modal').classList.remove('open'); }
};

// GEMINI CHAT
// ─────────────────────────────────────────
const Chat = {
  history: [],
  pendingImage: null,
  listenersReady: false,

  init() {
    if (this.listenersReady) return;
    document.addEventListener('paste', (event) => {
      if (!document.getElementById('panel-chat')?.classList.contains('active')) return;
      this.handlePaste(event);
    });
    document.addEventListener('click', () => this.closePhotoMenu());
    this.listenersReady = true;
  },

  endpoint() {
    if (CONFIG.AI_ENDPOINT) return CONFIG.AI_ENDPOINT;
    if (location.protocol !== 'http:' && location.protocol !== 'https:') return '';
    if (location.hostname.endsWith('github.io')) return '';
    return '/api/chat';
  },

  async send() {
    const inp = document.getElementById('chat-input');
    const text = inp.value.trim();
    if (!text && !this.pendingImage) return;
    const endpoint = this.endpoint();
    if (!endpoint) {
      this.addMessage('ai', 'AI 助手还没有配置安全的后端接口。请先部署 api/chat.js，并在 CONFIG.AI_ENDPOINT 中填入接口地址。');
      return;
    }

    const sendBtn = document.getElementById('chat-send-btn');
    sendBtn.disabled = true;
    inp.value = '';
    inp.style.height = 'auto';

    // Build message parts
    const parts = [];
    const image = this.pendingImage;
    if (this.pendingImage) {
      parts.push({ inlineData: { mimeType: this.pendingImage.mime, data: this.pendingImage.data } });
      this.pendingImage = null;
      this.renderImagePreview();
    }
    if (text) parts.push({ text });
    if (text || parts.length) this.addMessage('user', text, image?.url);

    if (!image && text && this.trySaveMemoryFromText(text)) {
      this.addMessage('ai', '我记住了。以后我会把这条信息作为长期上下文来参考。');
      sendBtn.disabled = false;
      return;
    }

    if (!image && text && this.tryApplyWorkoutFromText(text)) {
      this.addMessage('ai', this.workoutUpdateSummary());
      sendBtn.disabled = false;
      return;
    }

    // Show typing indicator
    const typingId = 'typing-' + Date.now();
    this.addTyping(typingId);

    // Build context from today's data
    const dt = DataStore.today();
    const day = DataStore.getDay(dt);
    const todaySummary = this.buildContext(day);

    try {
      const contents = [
        { role: 'user', parts: [{ text: todaySummary }] },
        { role: 'model', parts: [{ text: '好的，我已了解你今天的情况，请告诉我你需要什么帮助。' }] },
        ...this.history.map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] })),
        { role: 'user', parts }
      ];

      const resp = await fetch(endpoint,
        { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents, systemInstruction: this.systemPrompt() })
        }
      );
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        const error = new Error(data.error || 'AI request failed');
        error.status = resp.status;
        error.retryAfter = data.retryAfter;
        throw error;
      }
      const { displayText, applied, summary } = this.applyActionFromReply(data.text || '');
      let reply = displayText || (applied ? summary : '抱歉，我没有收到回复，请再试一次。');
      if (data.finishReason === 'MAX_TOKENS') {
        reply += '<br><br><span style="color:var(--amber)">这次回复可能被长度限制截断了。你可以直接回复“继续”。</span>';
      }
      document.getElementById(typingId)?.remove();
      this.addMessage('ai', reply);
      this.history.push({ role: 'user', text: text || '[图片]' });
      this.history.push({ role: 'ai', text: reply });
      if (this.history.length > 20) this.history = this.history.slice(-20);
    } catch(e) {
      document.getElementById(typingId)?.remove();
      this.addMessage('ai', this.errorMessage(e));
    }
    sendBtn.disabled = false;
  },

  errorMessage(error) {
    if (error?.status === 429 || /quota|rate limit|rate-limit|RESOURCE_EXHAUSTED/i.test(error?.message || '')) {
      const wait = error.retryAfter ? `，大约 ${error.retryAfter} 秒后再试` : '，请稍等一会儿再试';
      return `Gemini 免费额度或请求频率限制触发了${wait}。`;
    }
    if (error?.status === 403) {
      return 'AI 后端拒绝了当前网页来源，请检查 Vercel 的 ALLOWED_ORIGINS 设置。';
    }
    if (error?.status === 500 && /GEMINI_API_KEY/i.test(error?.message || '')) {
      return 'AI 后端没有配置 Gemini API Key，请检查 Vercel 环境变量。';
    }
    return 'AI 服务暂时不可用，请稍后重试。';
  },

  trySaveMemoryFromText(text) {
    const match = text.match(/^(?:请)?记住[：:]?\s*([\s\S]+)/);
    if (!match || !match[1].trim()) return false;
    const item = match[1].trim();
    const date = DataStore.today();
    DataStore.normalize();
    DataStore.data.aiMemory = `${DataStore.data.aiMemory.trim()}\n\n## User Added Memory\n- ${date}: ${item}`.trim();
    DataStore.data.memoryUpdatedAt = new Date().toISOString();
    Drive.scheduleSave();
    return true;
  },

  tryApplyWorkoutFromText(text) {
    const dt = DataStore.today();
    const day = DataStore.getDay(dt);
    if (day.st === 'rest') return false;
    const exList = DataStore.getExerciseList(dt);
    let changed = false;

    exList.forEach(ex => {
      const line = text.split(/\n|；|;/).find(part => this.lineMentionsExercise(part, ex));
      if (!line) return;
      const setMatch = line.match(/(\d+)\s*组/);
      const count = setMatch ? Math.min(parseInt(setMatch[1], 10), day.exercises[ex.id]?.length || 0) : day.exercises[ex.id]?.length || 0;
      const valueMatch = line.match(/每组\s*(\d+)|(\d+)\s*(?:个|次|秒)/);
      const value = valueMatch ? (valueMatch[1] || valueMatch[2]) : '';

      for (let i = 0; i < count; i++) {
        const set = day.exercises[ex.id]?.[i];
        if (!set) continue;
        if (value) set.v = value;
        set.d = true;
        changed = true;
      }
    });

    if (changed) {
      Drive.scheduleSave();
      UI.renderToday();
    }
    return changed;
  },

  lineMentionsExercise(line, ex) {
    if (line.includes(ex.name)) return true;
    const aliases = {
      c1: ['俯卧撑变式'],
      c2: ['面拉'],
      c3: ['蚌式开合', '蛤式开合', '侧卧蚌式'],
      c4: ['平板'],
      a1: ['俯卧撑'],
      a2: ['派克俯卧撑'],
      a3: ['死虫'],
      a4: ['臀桥'],
      b1: ['弹力带拉伸'],
      b2: ['弹力带划船', '划船'],
      b3: ['鸟狗'],
      b4: ['靠墙天使']
    };
    return (aliases[ex.id] || []).some(alias => line.includes(alias));
  },

  applyActionFromReply(reply) {
    const actionPattern = /\[\[FT_ACTION\]\]([\s\S]*?)\[\[\/FT_ACTION\]\]/g;
    const matches = [...reply.matchAll(actionPattern)];
    const displayText = reply.replace(actionPattern, '').trim();
    if (!matches.length) return { displayText, applied: false, summary: '' };

    const summaries = [];
    matches.forEach(match => {
      try {
        const action = JSON.parse(match[1].trim());
        const summary = this.applyAction(action);
        if (summary) summaries.push(summary);
      } catch(e) {}
    });

    return { displayText, applied: summaries.length > 0, summary: summaries.join('<br><br>') };
  },

  applyAction(action) {
    if (!action || typeof action !== 'object') return '';
    if (action.type === 'update_workout') {
      return this.applyWorkoutAction(action) ? this.workoutUpdateSummary() : '';
    }
    if (action.type === 'add_meals' || action.type === 'update_meals') {
      return this.applyMealAction(action);
    }
    if (action.type === 'add_note' || action.type === 'update_note') {
      return this.applyNoteAction(action);
    }
    return '';
  },

  applyWorkoutAction(action) {
    if (!action || action.type !== 'update_workout' || !Array.isArray(action.exercises)) return false;
    const dt = DataStore.today();
    const day = DataStore.getDay(dt);
    const validIds = new Set(DataStore.getExerciseList(dt).map(e => e.id));
    let changed = false;

    action.exercises.forEach(ex => {
      if (!validIds.has(ex.id) || !Array.isArray(ex.sets)) return;
      ex.sets.forEach(s => {
        const index = Number(s.index);
        const set = day.exercises[ex.id]?.[index];
        if (!set) return;
        if (s.value !== undefined) set.v = String(s.value);
        if (s.band) set.b = String(s.band);
        set.d = s.done !== false;
        changed = true;
      });
    });

    if (changed) {
      Drive.scheduleSave();
      UI.renderToday();
    }
    return changed;
  },

  applyMealAction(action) {
    if (!Array.isArray(action.meals)) return '';
    const dt = DataStore.today();
    const day = DataStore.getDay(dt);
    const now = new Date().toTimeString().slice(0,5);
    const added = [];

    action.meals.forEach(meal => {
      const text = String(meal.text || meal.name || '').trim();
      if (!text) return;
      const time = String(meal.time || now).trim() || now;
      const duplicate = (day.meals || []).some(m => m.time === time && m.text === text);
      if (duplicate) return;
      day.meals.push({ time, text });
      added.push({ time, text });
    });

    if (!added.length) return '';
    Drive.scheduleSave();
    UI.renderToday();
    return `已更新今天的饮食记录：<br>${added.map(m => `${m.time} ${m.text}`).join('<br>')}`;
  },

  applyNoteAction(action) {
    const text = String(action.text || action.note || '').trim();
    if (!text) return '';
    const day = DataStore.getDay(DataStore.today());
    const mode = action.mode === 'replace' ? 'replace' : 'append';
    const current = String(day.note || '').trim();

    if (mode === 'replace' || !current) {
      day.note = text;
    } else if (!current.includes(text)) {
      day.note = `${current}\n${text}`;
    } else {
      return '';
    }

    Drive.scheduleSave();
    UI.renderToday();
    return `已更新今日备注：<br>${day.note.replace(/\n/g, '<br>')}`;
  },

  workoutUpdateSummary() {
    const day = DataStore.getDay(DataStore.today());
    const exList = DataStore.getExerciseList(DataStore.today());
    const rows = exList.map(e => {
      const sets = day.exercises[e.id] || [];
      const done = sets.filter(s => s.d).length;
      return `${e.name}：${done}/${sets.length} 组`;
    });
    return `已更新今天的运动记录：<br>${rows.join('<br>')}`;
  },

  togglePhotoMenu(event) {
    event?.stopPropagation();
    document.getElementById('chat-photo-menu')?.classList.toggle('open');
  },

  closePhotoMenu() {
    document.getElementById('chat-photo-menu')?.classList.remove('open');
  },

  pickPhoto(source) {
    this.closePhotoMenu();
    const id = source === 'camera' ? 'hidden-camera' : 'hidden-gallery';
    document.getElementById(id)?.click();
  },

  handlePhoto(input, label = '📷 已选择图片') {
    const file = input.files[0];
    if (file) this.queueImage(file, label);
    input.value = '';
  },

  handlePaste(event) {
    const file = this.imageFromClipboard(event.clipboardData);
    if (!file) return;
    event.preventDefault();
    event.stopPropagation();
    this.queueImage(file, '📋 已粘贴图片');
  },

  handleDragOver(event) {
    if (this.imageFromFileList(event.dataTransfer?.items || event.dataTransfer?.files)) {
      event.preventDefault();
    }
  },

  handleDrop(event) {
    const file = this.imageFromFileList(event.dataTransfer?.files || event.dataTransfer?.items);
    if (!file) return;
    event.preventDefault();
    event.stopPropagation();
    this.queueImage(file, '📎 已添加图片');
  },

  imageFromClipboard(clipboardData) {
    if (!clipboardData) return null;
    return this.imageFromFileList(clipboardData.items)
      || this.imageFromFileList(clipboardData.files)
      || this.imageFromHtml(clipboardData.getData('text/html'));
  },

  imageFromFileList(list) {
    const items = Array.from(list || []);
    const item = items.find(x => {
      const type = x.type || '';
      return type.startsWith('image/');
    });
    if (!item) return null;
    return typeof item.getAsFile === 'function' ? item.getAsFile() : item;
  },

  imageFromHtml(html) {
    if (!html) return null;
    const match = html.match(/<img[^>]+src=["'](data:image\/[^"']+)["']/i);
    if (!match) return null;
    return this.fileFromDataUrl(match[1]);
  },

  fileFromDataUrl(dataUrl) {
    const [head, body] = dataUrl.split(',');
    const mime = (head.match(/data:([^;]+)/) || [])[1] || 'image/png';
    const bytes = atob(body || '');
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new File([arr], 'pasted-image.png', { type: mime });
  },

  queueImage(file, label) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      this.pendingImage = { data: base64, mime: file.type, url: e.target.result };
      this.renderImagePreview(label);
    };
    reader.readAsDataURL(file);
  },

  renderImagePreview(label = '已添加图片，可继续输入文字后发送') {
    const el = document.getElementById('chat-preview');
    if (!el) return;
    if (!this.pendingImage) {
      el.classList.remove('open');
      el.innerHTML = '';
      return;
    }
    el.classList.add('open');
    el.innerHTML = `
      <img src="${this.pendingImage.url}" alt="">
      <span class="chat-preview-text">${label}</span>
      <button class="chat-preview-remove" onclick="Chat.clearImage()" title="移除图片">×</button>`;
  },

  clearImage() {
    this.pendingImage = null;
    this.renderImagePreview();
  },

  addMessage(role, text, imgUrl) {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const time = new Date().toTimeString().slice(0,5);
    let content = '';
    if (imgUrl) content += `<img src="${imgUrl}" style="max-width:200px;border-radius:10px;margin-bottom:4px">`;
    if (text) content += text.replace(/\n/g, '<br>');
    div.innerHTML = `<div class="msg-bubble">${content}</div><span class="msg-time">${time}</span>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  },

  addTyping(id) {
    const msgs = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg ai typing-indicator';
    div.id = id;
    div.innerHTML = `<div class="msg-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  },

  buildContext(day) {
    const dt = DataStore.today();
    const now = new Date();
    const time = now.toTimeString().slice(0,5);
    let ctx = `今天是${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日，现在时间${time}，训练类型：${day.st === 'rest' ? '休息日' : '训练' + day.st + '（' + PLAN[day.st]?.name + '）'}。\n`;
    if (DataStore.data.aiMemory) ctx += `长期记忆：\n${DataStore.data.aiMemory}\n`;
    if (day.st !== 'rest' && PLAN[day.st]) {
      const exList = DataStore.getExerciseList(dt);
      let done = [], undone = [];
      exList.forEach(e => {
        const sets = day.exercises[e.id] || [];
        const d = sets.filter(s => s.d).length;
        if (d > 0) done.push(`${e.name}完成${d}组`);
        else undone.push(e.name);
      });
      if (done.length) ctx += `已完成：${done.join('、')}\n`;
      if (undone.length) ctx += `未完成：${undone.join('、')}\n`;
      ctx += `今日动作ID：${exList.map(e => `${e.id}=${e.name}，${e.sets}组，类型${e.type}`).join('；')}\n`;
    }
    if (day.meals?.length) ctx += `饮食记录：${day.meals.map(m => m.time + ' ' + m.text).join('；')}\n`;
    if (day.note) ctx += `备注：${day.note}\n`;
    return ctx;
  },

  systemPrompt() {
    return `你是一个专业的健身和营养顾问助手。用户是41岁男性，180cm，73.2kg，体脂22.9%（目标降至18%）。
目标：增加肩背肌肉、减少腹部脂肪、提高心肺功能。腰背有旧伤史（已恢复2年）。
当前第1阶段（第1-4周），每日蛋白质目标120g+。
对话上下文里的“长期记忆”优先级很高，要持续参考其中的用户资料、项目规则和用户新增记忆。
当用户描述或发送食物照片时，分析营养成分并给出建议。
当用户明确要求记录饮食、更新饮食记录，或说“把这个/刚才的/图片里的食物记到饮食记录中”时，必须附加隐藏动作块真正写入饮食记录。meal.text 要简洁记录吃了什么，可以包含估算份量和关键营养，不要写长分析。time 如果用户没指定，就使用当前时间。格式如下：
	[[FT_ACTION]]
	{"type":"add_meals","meals":[{"time":"当前HH:MM","text":"两根黄瓜，约30 kcal，补水为主"}]}
	[[/FT_ACTION]]
当用户明确要求“添加到备注”“记到备注”“更新今日备注”“保存到今日备注”或类似表达时，必须附加隐藏动作块真正写入今日备注。默认用 mode:"append" 追加到已有备注；只有用户明确要求替换/覆盖备注时才用 mode:"replace"。格式如下：
	[[FT_ACTION]]
	{"type":"add_note","mode":"append","text":"今天快走了6公里"}
	[[/FT_ACTION]]
	当用户汇报运动时，如果能明确识别今日动作、组数和每组次数/秒数，回复中必须附加一个隐藏动作块用于更新记录，格式如下：
	[[FT_ACTION]]
	{"type":"update_workout","exercises":[{"id":"动作ID","sets":[{"index":0,"value":"8","done":true}]}]}
	[[/FT_ACTION]]
	index 从 0 开始；3组就写 index 0、1、2。只更新用户明确提到的动作。隐藏动作块外的中文回复简洁、实用，不超过200字。`;
  }
};

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
const Nav = {
  show(tab) {
    ['today','history','chat'].forEach(t => {
      document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
      document.getElementById(`nav-${t}`).classList.toggle('active', t === tab);
    });
    if (tab === 'history') History.render();
    if (tab === 'today') UI.renderToday();
  }
};

// ─────────────────────────────────────────
// APP INIT
// ─────────────────────────────────────────
const App = {
  async start() {
    await Drive.load();
    await Memory.ensure();
    Chat.init();
    document.addEventListener('click', () => UI.closeRecordPhotoMenus());
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(console.error);
    }
  }
};

Auth.init();
</script>
